name: helpyourself
description: Emergency emotional self-help app — 3-minute LLM-guided rituals.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Local storage (First-Aid Kit / Аптечка)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # Animations
  lottie: ^3.1.3

  # Haptics
  flutter_haptic_feedback: ^1.0.0

  # Navigation
  go_router: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
